name: sales-flow

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sales-flow-postgres
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/docker-entrypoint-wrapper.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SEED_EMPLOYEE_TELEGRAM_CHAT_ID: ${SEED_EMPLOYEE_TELEGRAM_CHAT_ID:-0}
      SEED_REGIONAL_TELEGRAM_CHAT_ID: ${SEED_REGIONAL_TELEGRAM_CHAT_ID:-0}
      SEED_OPS_TELEGRAM_CHAT_ID: ${SEED_OPS_TELEGRAM_CHAT_ID:-0}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/docker-entrypoint-wrapper.sh:/docker-entrypoint-wrapper.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sales-flow-net

  ollama:
    profiles: ["ollama-docker"]
    image: ollama/ollama:latest
    container_name: sales-flow-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sales-flow-net

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: sales-flow-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Moscow}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change_me_n8n}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-local-dev-key-change-in-prod-32chars}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      N8N_WEBHOOK_BASE: ${N8N_WEBHOOK_BASE:-http://localhost:5678/webhook/}
      SEED_EMPLOYEE_TELEGRAM_CHAT_ID: ${SEED_EMPLOYEE_TELEGRAM_CHAT_ID:-0}
      SEED_REGIONAL_TELEGRAM_CHAT_ID: ${SEED_REGIONAL_TELEGRAM_CHAT_ID:-0}
      SEED_OPS_TELEGRAM_CHAT_ID: ${SEED_OPS_TELEGRAM_CHAT_ID:-0}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - sales-flow-net

  metabase:
    profiles: ["dashboard"]
    image: metabase/metabase:latest
    container_name: sales-flow-metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    ports:
      - "${METABASE_PORT:-3000}:3000"
    networks:
      - sales-flow-net

volumes:
  postgres_data:
  n8n_data:
  ollama_data:

networks:
  sales-flow-net:
    driver: bridge
